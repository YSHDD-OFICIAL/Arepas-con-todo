<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin · Arepas con Todo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Protección de ruta + verificación de admin -->
  <script>
    (function() {
      try {
        const sessionData = localStorage.getItem('arepas_session');
        if (!sessionData) {
          window.location.replace('index.html');
          return;
        }
        const { timestamp, email } = JSON.parse(sessionData);
        if (Date.now() - timestamp >= 30 * 24 * 3600000) {
          localStorage.removeItem('arepas_session');
          window.location.replace('index.html');
          return;
        }
        // Verificar si es admin (email configurado en admin@arepas.com)
        if (email !== 'admin@arepas.com') {
          window.location.replace('menu.html');
        }
      } catch(e) {
        window.location.replace('index.html');
      }
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <header class="main-header">
      <button class="back-btn" id="back-btn">←</button>
      <h1>🔧 Panel de administración</h1>
    </header>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="stats">📊 Estadísticas</button>
      <button class="admin-tab" data-tab="inventory">📦 Inventario</button>
      <button class="admin-tab" data-tab="coupons">🎫 Cupones</button>
      <button class="admin-tab" data-tab="abtests">🧪 A/B Testing</button>
      <button class="admin-tab" data-tab="fraud">🛡️ Fraude</button>
    </div>

    <div id="stats-tab" class="admin-tab-content active">
      <h3>📊 Productos más populares (IA)</h3>
      <ul id="top-products-list"></ul>
      <canvas id="sales-chart" style="max-height: 300px;"></canvas>
      <h3>📈 Forecast de ventas</h3>
      <p>Mejor hora para promocionar: <strong id="best-promo-time"></strong></p>
      <p>Predicción para mañana: <span id="forecast-tomorrow"></span></p>
      <h3>📋 Órdenes pendientes</h3>
      <div id="pending-orders-list"></div>
      <button id="clear-orders-btn" class="btn-secondary">Limpiar historial local</button>
    </div>

    <div id="inventory-tab" class="admin-tab-content hidden">
      <h3>📦 Gestionar inventario</h3>
      <div id="inventory-list"></div>
    </div>

    <div id="coupons-tab" class="admin-tab-content hidden">
      <h3>🎫 Crear cupón</h3>
      <input id="coupon-code-new" placeholder="Código">
      <select id="coupon-type">
        <option value="percentage">Porcentaje</option>
        <option value="fixed">Monto fijo</option>
      </select>
      <input id="coupon-value" type="number" placeholder="Valor">
      <input id="coupon-expires" type="date">
      <button id="create-coupon-btn" class="btn-primary">Crear cupón</button>
      <h3>📋 Cupones existentes</h3>
      <div id="coupons-list"></div>
    </div>

    <div id="abtests-tab" class="admin-tab-content hidden">
      <h3>🧪 Pruebas A/B activas</h3>
      <div id="abtests-list"></div>
      <button id="create-abtest-btn" class="btn-primary">➕ Nueva prueba A/B</button>
    </div>

    <div id="fraud-tab" class="admin-tab-content hidden">
      <h3>🛡️ Alertas de fraude</h3>
      <div id="fraud-alerts-list"></div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
