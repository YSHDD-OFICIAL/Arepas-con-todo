[build]
  command = ""
  publish = "app"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/sw.js"
  [headers.values]
    "Cache-Control" = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    "Cache-Control" = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, immutable"